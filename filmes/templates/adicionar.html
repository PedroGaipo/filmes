<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Adicionar Filme - Letterboxd</title>
</head>
<body>
    <div class="form-container">
        <h1>🎬 Adicionar Novo Filme</h1>
        <form method="POST">
            <div class="input-group">
                <label>Título do Filme</label>
                <input type="text" name="titulo" placeholder="Ex: Interestelar" required>
            </div>

            <div class="input-group">
                <label>Nota (0 a 10)</label>
                <input type="number" name="nota" step="0.1" min="0" max="10" placeholder="9.5" required>
            </div>

            <div class="input-group">
                <label>Categoria</label>
                <input type="text" name="categoria" placeholder="Ex: Drama, Ação">
            </div>

            <div class="input-group">
                <label>Comentário</label>
                <textarea name="comentario" rows="4" placeholder="O que você achou?"></textarea>
            </div>

            <div class="actions">
                <button type="submit" class="btn-save">Salvar Filme</button>
                <a href="/" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
